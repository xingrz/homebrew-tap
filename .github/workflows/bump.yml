name: Bump formulae

# Keeps the tap in sync with upstream releases.
#
# Three ways to run:
#   - schedule          : daily safety net (no upstream secret needed at all)
#   - workflow_dispatch : run by hand from the Actions tab
#   - repository_dispatch: fired by an upstream repo right after it releases,
#                          e.g. (needs a token with actions:write on this repo):
#       gh api repos/xingrz/homebrew-tap/dispatches \
#         -f event_type=bump -f 'client_payload[project]=tapeflow'
#
# Whichever triggers it, the commit is made by this repo's own GITHUB_TOKEN —
# no personal access token lives here.

on:
  schedule:
    - cron: "17 6 * * *" # daily ~06:17 UTC
  workflow_dispatch:
    inputs:
      project:
        description: "Project name from projects.yaml, or 'all'"
        default: all
  repository_dispatch:
    types: [bump]

permissions:
  contents: write

concurrency:
  group: bump
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bump
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          project="${{ github.event.inputs.project || github.event.client_payload.project || 'all' }}"
          echo "Updating: $project"
          ruby scripts/bump.rb "$project"

      - name: Push
        run: git push
